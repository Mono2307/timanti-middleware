name: Deploy Specific Commit to Fly.io

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: 'The specific commit SHA to deploy'
        required: true
        type: string

jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    steps:
      - name: Checkout specific commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.commit_sha }} # Use the provided commit SHA
          
      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master
        
      - name: Deploy app
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

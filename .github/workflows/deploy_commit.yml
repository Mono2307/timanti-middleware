name: Deploy Specific Commit to Fly.io

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: 'The specific commit SHA to deploy'
        required: true
        type: string

concurrency:
  group: fly-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    steps:
      - name: Checkout specific commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.commit_sha }}

      - name: Overlay fly.toml from main
        uses: actions/checkout@v4
        with:
          ref: main
          sparse-checkout: fly.toml
          sparse-checkout-cone-mode: false
          path: _main_fly

      - name: Use fly.toml from main
        run: cp _main_fly/fly.toml fly.toml

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy app
        run: flyctl deploy --remote-only --strategy immediate
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

# fly.toml app configuration file for timanti-middleware
app = 'timanti-middleware'
primary_region = 'bom'

[build]

[env]
  PORT = "8080"
  MIDDLEWARE_BASE_URL = "https://timanti-middleware.fly.dev"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
